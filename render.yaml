databases:
  - name: photoplat-db
    plan: free
    databaseName: photoplat
    user: photoplat

services:
  - type: web
    name: photoplat
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn project.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        fromDatabase:
          name: photoplat-db
          property: connectionString
      - key: CLOUDINARY_CLOUD_NAME
        value: "bvx7id2m"
      - key: CLOUDINARY_API_KEY
        value: "219834374572772"
      - key: CLOUDINARY_API_SECRET
        value: "_QUqJyttr1HMr7Ug18lP5dOxw7A"
